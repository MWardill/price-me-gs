name: Fetch eBay Pricing

on:
  schedule:
    # Runs every 15 minutes to process chunks of the game collection
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run pricing fetch
        run: npm start
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USE_DB: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RUNS_PER_WEEK: ${{ secrets.RUNS_PER_WEEK || '2' }}
          USER_EMAIL: ${{ secrets.USER_EMAIL || 'mat3740@gmail.com' }}
